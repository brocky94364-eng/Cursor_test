<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cursor 测试页</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0f172a;
      --fg: #e2e8f0;
      --accent: #38bdf8;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --fg: #0f172a;
        --accent: #0284c7;
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, "Segoe UI", sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(56, 189, 248, 0.15), transparent 40%),
        radial-gradient(circle at 80% 60%, rgba(99, 102, 241, 0.12), transparent 45%),
        var(--bg);
      color: var(--fg);
      display: grid;
      place-items: center;
      padding: 2rem;
    }
    main {
      max-width: 40rem;
      padding: 2rem 2.25rem;
      border-radius: 1rem;
      background: color-mix(in srgb, var(--fg) 6%, transparent);
      border: 1px solid color-mix(in srgb, var(--fg) 12%, transparent);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      letter-spacing: -0.02em;
    }
    p { line-height: 1.6; margin: 0.75rem 0 0; }
    .tag {
      display: inline-block;
      margin-top: 1.25rem;
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      font-size: 0.85rem;
      background: color-mix(in srgb, var(--accent) 18%, transparent);
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    }
    time { font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <main>
    <h1>你好，GitHub</h1>
    <p>这是一个用于测试 Cursor 与 Git 工作流的最小 HTML 页面，包含基础排版与明暗配色。</p>
    <p class="tag">生成时间：<time id="ts"></time></p>
  </main>
  <script>
    document.getElementById("ts").textContent = new Date().toLocaleString("zh-CN");
  </script>
</body>
</html>
